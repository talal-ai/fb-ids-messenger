name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Build desktop installer
        run: npm run release

      - name: List build artifacts
        shell: pwsh
        run: Get-ChildItem -Recurse release | Format-Table Name, Length -AutoSize

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Multi-FB-Manager-Setup-*.exe
            release/Multi-FB-Manager-Setup-*.exe.blockmap
            release/latest.yml
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
