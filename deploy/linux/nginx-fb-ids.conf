# nginx reverse proxy config for FB IDs Messenger API
#
# Install:
#   sudo cp deploy/linux/nginx-fb-ids.conf /etc/nginx/sites-available/fb-ids-messenger
#   sudo sed -i 's/YOUR_DOMAIN/app.yourdomain.com/g' /etc/nginx/sites-available/fb-ids-messenger
#   sudo ln -s /etc/nginx/sites-available/fb-ids-messenger /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d app.yourdomain.com
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # SSL — managed by certbot (do not edit manually)
    # ssl_certificate and ssl_certificate_key will be added by certbot

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to control-plane
    location / {
        proxy_pass         http://127.0.0.1:3847;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow long-running reply commands (Playwright can take up to 30s)
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
